<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR COMPONENT</title>
    <link href='https://fonts.googleapis.com/css?family=Outfit' rel='stylesheet'>
    <style>
        body {
            background-color: #D5E1EF;
            margin: 0;
            padding: 0;
        }

        #component {
            position: fixed;
            left: 50%;
            top: 50%;
            height: 497px;
            width: 320px;
            transform: translate(-50%, -50%);
            border-radius: 5%;
            background-color: white;
            box-shadow: 0 4px 2px -2px rgba(0, 0, 0, 0.2);
        }

        #QR {
            position: absolute;
            left: 50%;
            top: 33%;
            transform: translate(-50%, -50%);
        }

        img {
            height: 200px;
            width: 200px;
        }

        #innerbox {
            background-color: #2C7DFA;
            position: absolute;
            left: 50%;
            top: 33%;
            height: 288px;
            width: 288px;
            transform: translate(-50%, -50%);
            border-radius: 5%;
        }

        #shade1 {
            position: absolute;
            left: 167px;
            top: 212px;
            width: 120px;
            height: 75px;
            border-bottom-right-radius: 15%;
            border-top-left-radius: 100%;
            background-color: #3685FF;
            opacity: 1;
        }

        #shade2 {
            position: absolute;
            left: 0;
            top: 0;
            width: 165px;
            height: 160px;
            border-bottom-right-radius: 100%;
            border-top-left-radius: 5%;
            background-color: #3685FF;
            opacity: 1;
        }

        #text1 {
            text-align: center;
            padding: 20px;
            font-family: 'Outfit';
            font-size: 22px;
            color: #1F314F;
            position: absolute;
            top: 300px;
            left: 2px;
        }

        #text2 {
            text-align: center;
            padding: 20px;
            font-family: 'Outfit';
            font-size: 15px;
            color: #7D889E;
            position: absolute;
            top: 375px;
            left: 15px;
            width: 250px;
        }

        @media only screen and (max-width: 480px) {
            #component {
                height: 497px;
                width: 320px;
                top: 50%;
            }
            #innerbox{
                width: 288px;
                height: 288px;
                background-color:#3685FF;
            }

           #text1{
            padding: 20px;
            text-align: center;
            top: 300px;
            
           }
           #text2{
            padding: 20px;
            text-align: center;
            top:375px;
            left: 15px;
           }
           #shade1{
            background-color:#2C7DFA;
            top: 210px;
            left: 165px;
           }
           #shade2{
            background-color: #2C7DFA;
           }
        }
    </style>
</head>
<body>

<div id="component">
    <div id="innerbox">
        <div id="shade1"></div>
        <div id="shade2"></div>
    </div>
    <div id="QR">
        <img src="QRCODE.PNG" alt="QR Code">
    </div>
    <div id="text1"><b>Improve your front-end skills by building projects</b></div>
    <div id="text2">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</div>
</div>

</body>
</html>
